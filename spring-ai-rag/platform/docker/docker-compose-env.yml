# =============================================================================
# Merged Docker Compose - Environment Services
# Base: ec-demo + mall-retail infrastructure services
# Network: jason-lab-net
# =============================================================================
networks:
  jason-lab-net:
    driver: bridge

services:

  # ===========================================================================
  # MySQL 8.0 (from ec-demo)
  # ===========================================================================
  ec-demo-mysql:
    image: mysql:8.0.29
    container_name: ec-demo-mysql-8
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_ROOT_HOST: "%"
      TZ: Asia/Tokyo
      LANG: en_US.UTF-8
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_general_ci"]
    volumes:
      - ./sql/mysql-init:/docker-entrypoint-initdb.d
      - ${BASEPATH:-/mydata/ec-demo}/mysql/ec-demo/conf/my.cnf:/etc/my.cnf
      - ${BASEPATH:-/mydata/ec-demo}/mysql/ec-demo/data:/var/lib/mysql
      - ${BASEPATH:-/mydata/ec-demo}/mysql/ec-demo/log:/var/log/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      jason-lab-net:
        aliases:
          - powerjob-mysql

  # ===========================================================================
  # MySQL (mall-retail) - port 3306
  # ===========================================================================
  mall-mysql:
    image: mysql:8.0.29
    container_name: retail-mysql
    restart: unless-stopped
    environment:
      - TZ=Asia/Tokyo
      - LANG=en_US.UTF-8
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=nacos_config
    volumes:
      - ${BASEPATH:-/mydata/ec-demo}/mysql/mall/conf/my.cnf:/etc/my.cnf
      - ${BASEPATH:-/mydata/ec-demo}/mysql/mall/data:/var/lib/mysql
      - ${BASEPATH:-/mydata/ec-demo}/mysql/mall/log:/var/log/mysql
      - ${BASEPATH:-/mydata/ec-demo}/sql/mysql:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      jason-lab-net:
        aliases:
          - powerjob-mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

