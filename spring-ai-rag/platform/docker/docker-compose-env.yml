  # ===========================================================================
  # Elasticsearch 9.0 (from ec-demo) - custom build with kuromoji/icu
  # ===========================================================================
  ec-demo-elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.elasticsearch
      args:
        ES_IMAGE: ${ELASTICSEARCH_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:9.0.0}
    platform: ${EC_DEMO_PLATFORM:-linux/amd64}
    container_name: ec-demo-elasticsearch9
    restart: unless-stopped
    environment:
      - TZ=Asia/Tokyo
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms${ES_HEAP:-1g} -Xmx${ES_HEAP:-1g}
    ports:
      - "${ES_HTTP_PORT:-9200}:9200"
      - "${ES_TRANSPORT_PORT:-9300}:9300"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ${BASEPATH:-/mydata/ec-demo}/elasticsearch/data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
    networks:
      - jason-lab-net

  # ===========================================================================
  # Kibana 9.0 (from ec-demo)
  # ===========================================================================
  ec-demo-kibana:
    image: ${KIBANA_IMAGE:-docker.elastic.co/kibana/kibana:9.0.0}
    platform: ${EC_DEMO_PLATFORM:-linux/amd64}
    container_name: ec-demo-kibana9
    restart: unless-stopped
    depends_on:
      ec-demo-elasticsearch:
        condition: service_healthy
    environment:
      - TZ=Asia/Tokyo
      - SERVER_NAME=ec-demo-kibana
      - SERVER_HOST=0.0.0.0
      - ELASTICSEARCH_HOSTS=http://ec-demo-elasticsearch:9200
      - xpack.security.enabled=false
      - NODE_OPTIONS=--max-old-space-size=2048
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    networks:
      - jason-lab-net

  # ===========================================================================
  # MinIO (from ec-demo) - version pinned
  # ===========================================================================
  ec-demo-minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    platform: ${EC_DEMO_PLATFORM:-linux/amd64}
    container_name: ec-demo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - TZ=Asia/Tokyo
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${BASEPATH:-/mydata/ec-demo}/minio/data:/data
    networks:
      - jason-lab-net

  # ===========================================================================
  # MongoDB 6.0 (from ec-demo)
  # ===========================================================================
  ec-demo-mongodb:
    image: mongo:6.0
    container_name: ec-demo-mongodb-6
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - TZ=Asia/Tokyo
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-admin123}
      - MONGO_INITDB_DATABASE=ec_demo
    volumes:
      - ./sql/mongodb-init:/docker-entrypoint-initdb.d:ro
      - ${BASEPATH:-/mydata/ec-demo}/mongodb/data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - jason-lab-net

  # ===========================================================================
  # Redis 7.2 (from mall-retail)
  # ===========================================================================
  redis:
    image: redis:7.2.3
    container_name: retail-redis
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD} --appendonly no
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - ${BASEPATH:-/mydata/ec-demo}/redis/data:/data
      - ${BASEPATH:-/mydata/ec-demo}/redis/config/redis.conf:/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks:
      - jason-lab-net

